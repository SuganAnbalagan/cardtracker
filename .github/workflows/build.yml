name: Build Unsigned iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
        
    - name: Compile Main App Binary
      run: |
        mkdir -p build/Payload/CardTracker.app
        xcrun --sdk iphoneos swiftc App.swift Model.swift \
          -target arm64-apple-ios17.0 \
          -o build/Payload/CardTracker.app/CardTracker \
          -sdk $(xcrun --sdk iphoneos --show-sdk-path) \
          -emit-executable

    - name: Process and Resize App Icon
      run: |
        # Takes your uploaded icon.png and creates the exact required sizes
        mkdir -p build/Payload/CardTracker.app
        if [ -f "icon.png" ]; then
          sips -z 120 120 icon.png --out build/Payload/CardTracker.app/AppIcon60x60@2x.png
          sips -z 180 180 icon.png --out build/Payload/CardTracker.app/AppIcon60x60@3x.png
        fi

    - name: Package Metadata Profiles
      run: |
        echo '<?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>CardTracker</string>
            <key>CFBundleIdentifier</key>
            <string>com.premium.cardtracker</string>
            <key>CFBundleName</key>
            <string>CardTracker</string>
            <key>CFBundleShortVersionString</key>
            <string>4.0</string>
            <key>CFBundleVersion</key>
            <string>4</string>
            <key>MinimumOSVersion</key>
            <string>17.0</string>
            <key>UIRequiredDeviceCapabilities</key>
            <array><string>arm64</string></array>
            <key>UILaunchScreen</key>
            <dict/>
            <key>CFBundleIconFiles</key>
            <array>
                <string>AppIcon60x60</string>
            </array>
        </dict>
        </plist>' > build/Payload/CardTracker.app/Info.plist

        cd build
        zip -r ../CardTracker.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CardTracker-Custom-Icon
        path: CardTracker.ipa
