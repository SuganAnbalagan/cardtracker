name: Build Unsigned iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
        
    - name: Compile App Bundle Binary
      run: |
        mkdir -p build/Payload
        xcrun --sdk iphoneos swiftc App.swift \
          -target arm64-apple-ios15.0 \
          -o build/Payload/CardTracker \
          -sdk $(xcrun --sdk iphoneos --show-sdk-path) \
          -emit-executable \
          -parse-as-library

    - name: Package App Bundle Structure
      run: |
        cd build
        mkdir -p Payload/CardTracker.app
        mv Payload/CardTracker Payload/CardTracker.app/CardTracker
        
        # Create minimal required Info.plist
        echo '<?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>CardTracker</string>
            <key>CFBundleIdentifier</key>
            <string>com.yourname.cardtracker</string>
            <key>CFBundleName</key>
            <string>CardTracker</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>MinimumOSVersion</key>
            <string>15.0</string>
            <key>UILaunchScreen</key>
            <dict/>
            <key>WKApplication</key>
            <false/>
        </dict>
        </plist>' > Payload/CardTracker.app/Info.plist
        
        zip -r ../CardTracker.ipa Payload

    - name: Upload Finished IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CardTracker-Unsigned-IPA
        path: CardTracker.ipa
