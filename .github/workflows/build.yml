name: Build Unsigned iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Build Unsigned App
      run: |
        xcodebuild archive \
          -packagePath . \
          -scheme CardTracker \
          -destination "generic/platform=iOS" \
          -configuration Release \
          -archivePath ./build/CardTracker.xcarchive \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_PROFILE_SPECIFIER=""

    - name: Package App Bundle
      run: |
        mkdir -p Payload
        cp -r build/CardTracker.xcarchive/Products/Applications/CardTracker.app Payload/
        zip -r CardTracker.ipa Payload

    - name: Upload Finished IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CardTracker-Unsigned-IPA
        path: CardTracker.ipa
