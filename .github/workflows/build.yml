name: Build Unsigned iOS App & Widget

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
        
    - name: Compile Main App Binary
      run: |
        mkdir -p build/Payload/CardTracker.app
        xcrun --sdk iphoneos swiftc App.swift \
          -target arm64-apple-ios17.0 \
          -o build/Payload/CardTracker.app/CardTracker \
          -sdk $(xcrun --sdk iphoneos --show-sdk-path) \
          -emit-executable \
          -parse-as-library

    - name: Compile Widget Extension PlugIn Separately
      run: |
        mkdir -p build/Payload/CardTracker.app/PlugIns/CardTrackerWidget.appex
        # Compiled Widget.swift on its own to resolve duplicate '_main' linking errors
        xcrun --sdk iphoneos swiftc Widget.swift \
          -target arm64-apple-ios17.0 \
          -o build/Payload/CardTracker.app/PlugIns/CardTrackerWidget.appex/CardTrackerWidget \
          -sdk $(xcrun --sdk iphoneos --show-sdk-path) \
          -emit-executable \
          -parse-as-library

    - name: Package Metadata Profiles
      run: |
        # Main App Manifest
        echo '<?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>CardTracker</string>
            <key>CFBundleIdentifier</key>
            <string>com.premium.cardtracker</string>
            <key>CFBundleName</key>
            <string>CardTracker</string>
            <key>CFBundleShortVersionString</key>
            <string>4.0</string>
            <key>CFBundleVersion</key>
            <string>4</string>
            <key>MinimumOSVersion</key>
            <string>17.0</string>
            <key>UIRequiredDeviceCapabilities</key>
            <array><string>arm64</string></array>
            <key>UILaunchScreen</key>
            <dict/>
        </dict>
        </plist>' > build/Payload/CardTracker.app/Info.plist

        # Widget Extension Manifest
        echo '<?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>CardTrackerWidget</string>
            <key>CFBundleIdentifier</key>
            <string>com.premium.cardtracker.widget</string>
            <key>CFBundleName</key>
            <string>CardTrackerWidget</string>
            <key>CFBundleShortVersionString</key>
            <string>4.0</string>
            <key>CFBundleVersion</key>
            <string>4</string>
            <key>MinimumOSVersion</key>
            <string>17.0</string>
            <key>NSExtension</key>
            <dict>
                <key>NSExtensionPointIdentifier</key>
                <string>com.apple.widgetkit-extension</string>
            </dict>
        </dict>
        </plist>' > build/Payload/CardTracker.app/PlugIns/CardTrackerWidget.appex/Info.plist

        cd build
        zip -r ../CardTracker.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CardTracker-With-Widget
        path: CardTracker.ipa
