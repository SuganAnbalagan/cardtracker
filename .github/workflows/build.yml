name: Build Unsigned iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
        
    - name: Compile App Binary with Modern Frameworks
      run: |
        mkdir -p build/Payload/CardTracker.app
        xcrun --sdk iphoneos swiftc App.swift \
          -target arm64-apple-ios17.0 \
          -o build/Payload/CardTracker.app/CardTracker \
          -sdk $(xcrun --sdk iphoneos --show-sdk-path) \
          -emit-executable \
          -parse-as-library

    - name: Generate Premium Custom Metallic App Icon
      run: |
        # Injects a sleek deep slate blue layered application icon bundle
        mkdir -p build/Payload/CardTracker.app
        /usr/bin/swift -e '
        import Foundation
        import CoreImage
        import AppKit
        
        let ctx = CIContext()
        if let filter = CIFilter(name: "CILinearGradient") {
            filter.setValue(CIVector(x: 0, y: 0), forKey: "inputPoint0")
            filter.setValue(CIVector(x: 1024, y: 1024), forKey: "inputPoint1")
            filter.setValue(CIColor(red: 0.08, green: 0.08, blue: 0.18), forKey: "inputColor0")
            filter.setValue(CIColor(red: 0.15, green: 0.35, blue: 0.60), forKey: "inputColor1")
            if let output = filter.outputImage?.cropped(to: CGRect(x: 0, y: 0, width: 1024, height: 1024)) {
                if let cgImage = ctx.createCGImage(output, from: output.extent) {
                    let rep = NSBitmapImageRep(cgImage: cgImage)
                    if let data = rep.representation(using: .png, properties: [:]) {
                        try? data.write(to: URL(fileURLWithPath: "build/Payload/CardTracker.app/AppIcon60x60@2x.png"))
                        try? data.write(to: URL(fileURLWithPath: "build/Payload/CardTracker.app/AppIcon60x60@3x.png"))
                    }
                }
            }
        }'

    - name: Inject Metadata Configuration Packages
      run: |
        echo '<?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>CardTracker</string>
            <key>CFBundleIdentifier</key>
            <string>com.premium.cardtracker</string>
            <key>CFBundleName</key>
            <string>CardTracker</string>
            <key>CFBundleShortVersionString</key>
            <string>3.0</string>
            <key>CFBundleVersion</key>
            <string>3</string>
            <key>MinimumOSVersion</key>
            <string>17.0</string>
            <key>UIRequiredDeviceCapabilities</key>
            <array><string>arm64</string></array>
            <key>UILaunchScreen</key>
            <dict/>
            <key>CFBundleIconFiles</key>
            <array>
                <string>AppIcon60x60</string>
            </array>
        </dict>
        </plist>' > build/Payload/CardTracker.app/Info.plist

        cd build
        zip -r ../CardTracker.ipa Payload

    - name: Upload Finished Production IPA
      uses: actions/upload-artifact@v4
      with:
        name: CardTracker-iOS26-Edition
        path: CardTracker.ipa
